<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>夜行图鉴 · No.004 · 怯</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #020a0e; overflow: hidden; }
canvas { position: fixed; top: 0; left: 0; cursor: none; }
#label {
  position: fixed; top: 24px; left: 30px;
  color: rgba(160, 210, 230, 0.16);
  font: 11px/1 'Georgia', serif;
  letter-spacing: 0.22em;
  pointer-events: none; user-select: none;
}
#hint {
  position: fixed; bottom: 28px; width: 100%; text-align: center;
  color: rgba(160, 210, 230, 0.19);
  font: 12px/1 'Georgia', serif;
  letter-spacing: 0.18em;
  pointer-events: none; user-select: none;
  animation: fadeHint 2s 10s forwards ease-in;
}
@keyframes fadeHint { to { opacity: 0; } }
</style>
</head>
<body>
<div id="label">夜行图鉴 · No.004 · 怯</div>
<canvas id="c"></canvas>
<div id="hint">移远目光，让它出来</div>
<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
let W, H, CX, CY;
function resize() {
  W = cvs.width = window.innerWidth;
  H = cvs.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

let mx = CX, my = CY, mPresent = false;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; mPresent = true; });
document.addEventListener('mouseleave', () => { mPresent = false; });
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY; mPresent = true;
}, { passive: true });
document.addEventListener('touchend', () => { mPresent = false; });

// Moth-shaped creature, all points relative to (0,0)
function mothPoints() {
  const p = [];

  // Body: 6 vertical points
  for (let i = 0; i < 6; i++) p.push([0, -45 + i * 17]);

  // Upper wings: left (s=-1) and right (s=1), each a half-ellipse arc
  for (const s of [-1, 1]) {
    for (let i = 0; i <= 13; i++) {
      const a = Math.PI * 0.5 + (i / 13) * Math.PI;
      const x = s * (-Math.cos(a)) * 108;
      const y = Math.sin(a) * 62 - 12;
      if (s * x > 0 || i === 0 || i === 13) p.push([x, y]);
    }
  }

  // Lower wings: smaller half-ellipses
  for (const s of [-1, 1]) {
    for (let i = 0; i <= 9; i++) {
      const a = Math.PI * 0.5 + (i / 9) * Math.PI;
      const x = s * (-Math.cos(a)) * 72;
      const y = Math.sin(a) * 42 + 25;
      if (s * x > 0 || i === 0 || i === 9) p.push([x, y]);
    }
  }

  // Antennae: 5 points each, curve outward and up
  for (let i = 1; i <= 5; i++) {
    const f = i / 5;
    p.push([-6 - f * 32, -48 - f * 40 + f * f * 12]);
    p.push([6 + f * 32, -48 - f * 40 + f * f * 12]);
  }

  return p;
}

class Particle {
  constructor(hx, hy) {
    this.hx = hx; this.hy = hy;
    const a = Math.random() * Math.PI * 2;
    const d = 820 + Math.random() * 300;
    this.fx = Math.cos(a) * d;
    this.fy = Math.sin(a) * d;
    this.x = this.fx; this.y = this.fy;
    this.r = 1.0 + Math.random() * 1.7;
    this.hue = 185 + Math.random() * 30;
    this.ph = Math.random() * Math.PI * 2;
    this.dr = 1.4 + Math.random() * 2.2;
    this.ds = 0.22 + Math.random() * 0.4;
  }

  update(pres, t, floatY) {
    const tx = pres * this.hx + (1 - pres) * this.fx;
    const ty = pres * (this.hy + floatY) + (1 - pres) * this.fy;
    const drift = pres * pres;
    const dx = Math.sin(t * this.ds + this.ph) * this.dr * drift;
    const dy = Math.cos(t * this.ds * 0.75 + this.ph * 1.3) * this.dr * drift;
    const spd = pres < 0.25 ? 0.09 : (pres < 0.55 ? 0.055 : 0.019);
    this.x += (tx + dx - this.x) * spd;
    this.y += (ty + dy - this.y) * spd;
  }

  draw(pres, t) {
    const tw = 0.8 + 0.2 * Math.sin(t * 1.6 + this.ph);
    const alpha = pres * tw * 0.9;
    if (alpha < 0.008) return;
    const hue = this.hue + Math.sin(t * 0.25 + this.ph) * 12;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = `hsl(${hue}, 60%, 72%)`;
    ctx.shadowBlur = this.r * 5.5;
    ctx.fillStyle = `hsl(${hue}, 28%, 90%)`;
    ctx.beginPath();
    ctx.arc(CX + this.x, CY + this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

const pts = mothPoints();
const particles = pts.map(([x, y]) => new Particle(x, y));

// Soft ambient halo ring
for (let i = 0; i < 16; i++) {
  const a = (i / 16) * Math.PI * 2;
  const r = 130 + (i % 3) * 12;
  particles.push(new Particle(Math.cos(a) * r, Math.sin(a) * r));
}

let t = 0;

function getPresence() {
  if (!mPresent) return 1;
  const d = Math.hypot(mx - CX, my - CY);
  return Math.max(0, Math.min(1, (d - 90) / 210));
}

function drawAura(pres) {
  if (pres < 0.04) return;
  const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, 148);
  g.addColorStop(0, `rgba(110, 195, 228, ${0.032 * pres})`);
  g.addColorStop(0.55, `rgba(70, 145, 195, ${0.018 * pres})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(CX, CY, 148, 0, Math.PI * 2);
  ctx.fill();
}

// When creature is gone: a faint pulsing dot where it was
function drawGhost(pres) {
  if (pres > 0.18) return;
  const pulse = 0.5 + 0.5 * Math.sin(t * 0.72);
  const a = (1 - pres / 0.18) * 0.055 * pulse;
  if (a < 0.003) return;
  ctx.save();
  ctx.globalAlpha = a;
  ctx.shadowColor = 'rgba(150, 205, 230, 0.9)';
  ctx.shadowBlur = 10;
  ctx.fillStyle = 'rgba(165, 212, 235, 0.95)';
  ctx.beginPath();
  ctx.arc(CX, CY, 1.8 + 0.3 * Math.sin(t * 0.72), 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawCursor() {
  if (!mPresent) return;
  ctx.save();
  ctx.globalAlpha = 0.1;
  ctx.strokeStyle = 'rgba(130, 185, 210, 0.8)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.arc(mx, my, 3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function loop() {
  ctx.fillStyle = 'rgba(2, 10, 14, 0.22)';
  ctx.fillRect(0, 0, W, H);
  t += 0.016;
  const pres = getPresence();
  const floatY = Math.sin(t * 0.35) * 7;
  drawAura(pres);
  particles.forEach(p => { p.update(pres, t, floatY); p.draw(pres, t); });
  drawGhost(pres);
  drawCursor();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
